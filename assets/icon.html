<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F4EEE2; }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle 76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <rect width="32" height="32" rx="7" fill="#F4EEE2"/>
    <rect x="6" y="8" width="20" height="2.8" rx="1.4" fill="#8A2A2A"/>
    <g fill="none" stroke="#201B15" stroke-width="2.6" stroke-linecap="round">
      <path d="M12 15h8"/>
      <path d="M11.5 20h9"/>
      <path d="M13 15l-1.4 9"/>
      <path d="M19 15l-1.4 9"/>
    </g>
  </svg>
</body>
</html>
